# mise — tool version + task management for rfc-site.
#
# Install:  https://mise.jdx.dev/getting-started.html
# Activate: `mise install` (one-time per checkout) — or `mise trust` first
#           if mise warns about an untrusted config.
#
# Versions here are the source of truth for local development. CI pins the
# same versions in `.github/workflows/`; if you bump a version here, bump
# it there too (and vice versa).
#
# Stack reference: ADR-0002 (React 19 + RR7 + TanStack Query + orval, with
# Bun as runtime + package manager and Vite as bundler).

[tools]
# Bun is the runtime + package manager per ADR-0002.
bun = "latest"
# Node kept for tool compat (some eslint plugins / vitest plugins still
# expect node on PATH). Drop once everything is confirmed Bun-native.
# See IMPL-0001 §Open Questions §Phase 1.
node = "22"

# Repo utilities
# Formatters and linters
markdownlint-cli2 = "0.18.1"
yamlfmt = "0.20.0"
yamllint = "1.37.1"
prettier = "3.7.4"
"github:donaldgifford/makefmt" = "latest"
checkmake = "latest"
git-cliff = "latest"

# tools
yq = "4.48.1"
jq = "latest"
"github:donaldgifford/docz" = "latest"
